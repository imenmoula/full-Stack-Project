<div class="container">
    <div class="card shadow mb-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Id Patient</th>
                            <th>Nom Patient</th>
                            <th>Prénom Patient</th>
                            <th>Téléphone Patient</th>
                            <th>Maladie Patient</th>
                            <th>Date Création</th>
                            <th>Doctors</th>
                            <th></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let p of patients">
                            <td>{{ p.idPatient }}</td>
                            <td>{{ p.nomPatient }}</td>
                            <td>{{ p.prenomPatient }}</td>
                            <td>{{ p.phonePatient }}</td>
                            <td>{{ p.maladiePatient }}</td>
                            <td>{{ p.dateCreation | date: 'dd/MM/yyyy' }}</td>
                            <td>{{ p.doctor.nomDoct }}</td-->
                            <td><button class="btn btn-success" [routerLink]="['/updatePatient', p.idPatient]">Modifier</button></td>
                            <td>
                                <button class="btn btn-danger" (click)="supprimerPatient(p)">Supprimer</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
